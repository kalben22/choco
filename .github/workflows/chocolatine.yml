name: Chocolatine Workflow

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:kalben22/choco2.git"
  EXECUTABLES: "mysh"

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: ${{ github.repository != 'kalben22/choco2' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check repository for coding style errors
        run: banana-check-repo

      - name: Report coding style errors as annotations
        if: always()
        run: |
          if [ ! -f coding-style-reports.log ] || [ ! -s coding-style-reports.log ]; then
            exit 0
          fi

          while IFS= read -r line; do
            # Format attendu dans le log : ./file.c:LINE: SEVERITY: CODE - message
            file=$(echo "$line" | cut -d':' -f1 | sed 's|^\./||')
            lineno=$(echo "$line" | cut -d':' -f2)
            severity=$(echo "$line" | cut -d':' -f3 | tr -d ' ')
            code_msg=$(echo "$line" | cut -d':' -f4-)

            # Construire le titre selon le format affiché dans l'image
            title="${severity} coding style error: ${file}#L${lineno}"

            echo "::error file=${file},line=${lineno},title=${title}::${code_msg}"
          done < coding-style-reports.log

      - name: Fail if any coding style errors exist
        if: always()
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: Compile project
        run: make
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: Clean project build artifacts
        run: make clean

      - name: Check that executables exist and are executable
        run: |
          FAIL=0
          for exec in $(echo "$EXECUTABLES" | tr ',' '\n'); do
            if [ ! -f "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' was not found"
              FAIL=1
            elif [ ! -x "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' is not executable"
              FAIL=1
            fi
          done
          exit $FAIL

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: ${{ github.repository != 'kalben22/choco2' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run unit tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ github.event_name == 'push' && github.repository != 'kalben22/choco2' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository to Epitech
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
