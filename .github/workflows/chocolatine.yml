name: Chocolatine Workflow

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'
env:
  MIRROR_SSH_URL: git@github.com:kalben22/choco2.git
  EXECUTABLES: mysh

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: ${{ github.repository != 'kalben22/choco2' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check repository for coding style errors
        run: banana-check-repo

      - name: Compile project
        run: make
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: Display coding style errors as annotations
        if: always()
        run: |
          if [ -f coding-style-reports.log ]; then
            while IFS= read -r line; do
              file=$(echo "$line" | cut -d':' -f1 | sed 's|^\./||')
              lineno=$(echo "$line" | cut -d':' -f2)
              severity=$(echo "$line" | cut -d':' -f3)
              code=$(echo "$line" | cut -d':' -f4)
              detail=$(echo "$line" | cut -d':' -f5- | sed 's/^ //')
              case "$severity" in
                MAJOR) label="Major" ;;
                MINOR) label="Minor" ;;
                INFO)  label="Info"  ;;
                *)     label="$severity" ;;
              esac
              echo "::error file=${file},line=${lineno},title=${label} coding style error\: ${file}#L${lineno}::${code} - ${detail}"
            done < coding-style-reports.log
          fi

      - name: Fail if any coding style errors exist
        if: always()
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: Clean project build artifacts
        run: make clean

      - name: Verify executables exist and are executable
        run: |
          for executable in $(echo "$EXECUTABLES" | tr ',' '\n'); do
            if [ ! -f "$executable" ]; then
              echo "::error title=Missing executable::Executable '$executable' was not found"
              exit 1
            fi
            if [ ! -x "$executable" ]; then
              echo "::error title=Non-executable file::File '$executable' exists but is not executable"
              exit 1
            fi
          done

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: ${{ github.repository != 'kalben22/choco2' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run unit tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ github.event_name == 'push' && github.repository != 'kalben22/choco2' }}    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository to Epitech
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
