name: Chocolatine Workflow

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:kalben22/choco2.git"
  EXECUTABLES: "mysh"

jobs:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: github.repository != 'kalben22/choco2'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for banned files
        run: banana-check-repo

      - name: Compile and generate coding style report
        run: make CC=epiclang 2>&1 | tee coding-style-reports.log
        timeout-minutes: 2

      - name: Annotate coding style errors
        if: always()
        run: |
          grep "Banana" coding-style-reports.log 2>/dev/null | while IFS= read -r line; do
            file=$(echo "$line"     | grep -oP '^[^:]+')
            lineno=$(echo "$line"   | grep -oP '^\S+:\K\d+(?=:\d+:)')
            severity=$(echo "$line" | grep -oP '\[Banana\] \[\K[^\]]+')
            code=$(echo "$line"     | grep -oP '\(C-\w+\)' | tr -d '()')
            message=$(echo "$line"  | grep -oP '\[Banana\] \[[^\]]+\] \K[^(]+' | sed 's/ $//')
            echo "::error file=${file},line=${lineno},title=${severity} coding style error: ${file}#L${lineno}::${code} - ${message}"
          done
          exit 0

      - name: Fail if coding style errors exist
        if: always()
        run: grep -q "Banana" coding-style-reports.log 2>/dev/null && exit 1 || exit 0

      - name: Clean build artifacts
        run: make clean

      - name: Verify executables
        run: |
          for exec in $(echo "$EXECUTABLES" | tr ',' ' '); do
            [ ! -f "$exec" ] && echo "::error::'$exec' not found" && exit 1
            [ ! -x "$exec" ] && echo "::error::'$exec' is not executable" && exit 1
          done

  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    if: github.repository != 'kalben22/choco2'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push' && github.repository != 'kalben22/choco2'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
