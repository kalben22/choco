name: Chocolatine Workflow
on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'
env:
  MIRROR_SSH_URL: git@github.com:EpitechPGE1-2025/G-PSU-200-COT-2-1-minishell1-39.git
  EXECUTABLES: mysh

jobs:
  #job-1:
  check_compilation_and_coding_style:
    name: Check compilation and coding style
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    if: ${{ github.repository != 'EpitechPGE1-2025/G-PSU-200-COT-2-1-minishell1-39.git'}}
    steps:
      - name: check-repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: coding-style
        run: banana-check-repo
      - name: compile
        run: make
        timeout-minutes: 2
        env:
          CC: epiclang
      - name: clean
        run: make clean
  #job-2:
  run_tests:
    name: tests-run
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker
    needs: check_compilation_and_coding_style
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: tests-run
        run: make tests_run
        timeout-minutes: 2
  #job-3:
  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{secrets.GITLAB_SSH_PRIVATE_KEY}}
